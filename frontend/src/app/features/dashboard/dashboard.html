<h1>Dashboard</h1>

<p *ngIf="loading">Cargando datosss...</p>

<p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

<div *ngIf="administrador">
  <p>
    <strong>Nombreee:</strong> {{ administrador.nombre }}
  </p>

  <p>
    <strong>Correo:</strong> {{ administrador.correo }}
  </p>
</div>

<button (click)="cerrarSesion()">
    Cerrar sesión
</button>

<button
  routerLink="/profile"
  style="background: blue; color: white; padding: 10px; margin-top: 20px;">
  Mi Perfil
</button>

<p>Prueba Dashboard</p>
